<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pop Music Guessing Game</title>

  <!-- Bootstrap CSS -->
  <link href="css/styles.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to bottom, #ffe4ec, #fff0f5);
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    .container-game {
      max-width: 700px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 6px 18px rgba(255, 77, 109, 0.2);
    }

    h1 {
      color: #ff4d6d;
    }

    .question {
      font-size: 24px;
      margin: 25px 0;
      font-weight: bold;
      color: #6a0dad;
    }

    .btn-answer {
      display: block;
      width: 80%;
      margin: 12px auto;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      background-color: #ff85a1;
      color: white;
      cursor: pointer;
    }

    .btn-answer:hover {
      background-color: #ff4d6d;
    }

    .result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .score {
      margin-top: 10px;
      font-size: 18px;
      color: #ff4d6d;
    }

    .next-btn {
      margin-top: 20px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- NAVBAR (same as your other pages) -->
<nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
  <div class="container px-5">
    <a class="navbar-brand" href="index.html">
      <span class="fw-bolder text-primary">Get to Know Me!!</span>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">

    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="resume.html">Resume</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="scratch.html">Projects</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="game.html">Game</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- GAME CONTENT -->
<div class="container-game">
  <h1>Pop Music Guessing Game 🎧</h1>
  <p>Pop Trivia game to test your knowledge on pop music artists! </p>

  <div class="question" id="question"></div>
  <div id="answers"></div>

  <div class="result" id="result"></div>
  <div class="score" id="score">Score: 0</div>

  <button class="btn btn-primary next-btn hidden" id="nextBtn">Next Question</button>

  <br><br>
  <a href="scratch.html" class="btn btn-outline-dark">Back to Music Page</a>
</div>

<!-- GAME SCRIPT -->
<script>
  const questions = [
    {
      question: "Who is known as the King of Pop?",
      answers: ["Michael Jackson", "Bruno Mars", "Harry Styles", "Bad Bunny"],
      correct: "Michael Jackson"
    },
    {
      question: "Who sings 'Blinding Lights'?",
      answers: ["The Weeknd", "Taylor Swift", "Prince", "Kali Uchis"],
      correct: "The Weeknd"
    },
    {
      question: "Who is famous for storytelling lyrics?",
      answers: ["Taylor Swift", "Prince", "Bruno Mars", "Bad Bunny"],
      correct: "Taylor Swift"
    },
    {
      question: "Who sang 'Purple Rain'?",
      answers: ["Prince", "Harry Styles", "The Weeknd", "Michael Jackson"],
      correct: "Prince"
    },
    {
      question: "Which artist mixes Latin music with pop?",
      answers: ["Bad Bunny", "Bruno Mars", "Harry Styles", "Taylor Swift"],
      correct: "Bad Bunny"
    },
    {
      question: "Who sang 'As It Was'?",
      answers: ["Harry Styles", "The Weeknd", "Bruno Mars", "Prince"],
      correct: "Harry Styles"
    },
    {
      question: "Which artist released the album '1989'?",
      answers: ["Taylor Swift", "Kali Uchis", "Bruno Mars", "The Weeknd"],
      correct: "Taylor Swift"
    },
    {
      question: "Who is known for the song 'Treasure'?",
      answers: ["Bruno Mars", "Michael Jackson", "Harry Styles", "Bad Bunny"],
      correct: "Bruno Mars"
    },
    {
      question: "Which artist created the song 'Die For You'?",
      answers: ["The Weeknd", "Prince", "Taylor Swift", "Kali Uchis"],
      correct: "The Weeknd"
    },
    {
      question: "Who is known for 'Smooth Criminal'?",
      answers: ["Michael Jackson", "Bruno Mars", "Prince", "Harry Styles"],
      correct: "Michael Jackson"
    },
    {
      question: "Which artist sings 'telepatía'?",
      answers: ["Kali Uchis", "Bad Bunny", "Taylor Swift", "The Weeknd"],
      correct: "Kali Uchis"
    },
    {
      question: "Who is known for the song 'Watermelon Sugar'?",
      answers: ["Harry Styles", "Bruno Mars", "Prince", "Michael Jackson"],
      correct: "Harry Styles"
    },
    {
      question: "Which artist is famous for 'Call Out My Name'?",
      answers: ["The Weeknd", "Bruno Mars", "Prince", "Taylor Swift"],
      correct: "The Weeknd"
    },
    {
      question: "Who released the album 'Un Verano Sin Ti'?",
      answers: ["Bad Bunny", "Kali Uchis", "The Weeknd", "Harry Styles"],
      correct: "Bad Bunny"
    },
    {
      question: "Which artist is known for 'When I Was Your Man'?",
      answers: ["Bruno Mars", "Michael Jackson", "Prince", "The Weeknd"],
      correct: "Bruno Mars"
    }
  ];

  let current = 0;
  let score = 0;

  const questionEl = document.getElementById("question");
  const answersEl = document.getElementById("answers");
  const resultEl = document.getElementById("result");
  const scoreEl = document.getElementById("score");
  const nextBtn = document.getElementById("nextBtn");

  function loadQuestion() {
    resultEl.textContent = "";
    answersEl.innerHTML = "";
    nextBtn.classList.add("hidden");

    const q = questions[current];
    questionEl.textContent = q.question;

    q.answers.forEach(ans => {
      const btn = document.createElement("button");
      btn.textContent = ans;
      btn.classList.add("btn-answer");
      btn.onclick = () => checkAnswer(ans);
      answersEl.appendChild(btn);
    });
  }

  function checkAnswer(answer) {
    const correct = questions[current].correct;
    const buttons = document.querySelectorAll(".btn-answer");

    buttons.forEach(b => b.disabled = true);

    if (answer === correct) {
      resultEl.textContent = "Correct!";
      resultEl.style.color = "green";
      score++;
    } else {
      resultEl.textContent = "Wrong! Correct answer: " + correct;
      resultEl.style.color = "red";
    }

    scoreEl.textContent = "Score: " + score;
    nextBtn.classList.remove("hidden");
  }

  nextBtn.onclick = () => {
    current++;
    if (current < questions.length) {
      loadQuestion();
    } else {
      questionEl.textContent = "Game Over!";
      answersEl.innerHTML = "";
      resultEl.textContent = "Final Score: " + score + "/" + questions.length;
      nextBtn.classList.add("hidden");
    }
  };

  loadQuestion();
</script>
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
